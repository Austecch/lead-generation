<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Emily Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span class="logo-icon">✨</span>
                <span class="logo-text">Emily<span class="highlight">Experience</span></span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="event-planning.html">Plan Event</a></li>
                <li><a href="vendors.html">Vendors</a></li>
                <li><a href="gifts.html">Gifts</a></li>
                <li><a href="rentals.html">Rentals</a></li>
                <li><a href="tickets.html">Tickets</a></li>
            </ul>
            <div class="nav-actions">
                <a href="dashboard.html" class="btn btn-ghost">Dashboard</a>
                <a href="login.html" class="btn btn-primary">Sign In</a>
            </div>
            <button class="mobile-toggle" aria-label="Toggle menu">☰</button>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">
                    <span class="logo-icon">✨</span>
                    <span class="logo-text">Emily<span class="highlight">Experience</span></span>
                </a>
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <label class="checkbox-item" style="margin: 0;">
                        <input type="checkbox">
                        <span style="font-size: 0.9rem;">Remember me</span>
                    </label>
                    <a href="#" style="font-size: 0.9rem; color: var(--gold);">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Sign In</button>
            </form>

            <div class="auth-divider"><span>Or continue with</span></div>

            <div class="social-buttons">
                <button class="social-btn">
                    <span>🔍</span>
                    <span>Google</span>
                </button>
                <button class="social-btn">
                    <span>💼</span>
                    <span>LinkedIn</span>
                </button>
            </div>

            <div class="auth-footer">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            showNotification('Signing in...', 'info');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });
    </script>
</body>
</html>
