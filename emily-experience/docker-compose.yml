version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emily-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - emily-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=emily_experience
      - DB_USERNAME=emily_user
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis

  # Web Server
  web:
    image: nginx:alpine
    container_name: emily-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    networks:
      - emily-network
    depends_on:
      - app

  # Database
  db:
    image: mysql:8.0
    container_name: emily-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: emily_experience
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_USER: emily_user
      MYSQL_PASSWORD: secret
    volumes:
      - db-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - emily-network
    ports:
      - "3306:3306"

  # Redis Cache & Queue
  redis:
    image: redis:alpine
    container_name: emily-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - emily-network
    ports:
      - "6379:6379"

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emily-worker
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
    networks:
      - emily-network
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emily-scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
      - redis
    networks:
      - emily-network
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - REDIS_HOST=redis

  # Mailpit (Email catcher for development)
  mailpit:
    image: axllent/mailpit
    container_name: emily-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - emily-network
    volumes:
      - mailpit-data:/data

networks:
  emily-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
  mailpit-data:
